[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY_HERE\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account@your-project-id.iam.gserviceaccount.com"
client_id = "your-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/your-service-account%40your-project-id.iam.gserviceaccount.com"

# ── Setup ──────────────────────────────────────────────────────────────────
# 1. Copy this file to: .streamlit/secrets.toml
# 2. Fill in the values above from your Google Cloud service account JSON key
#    (Google Cloud Console → IAM & Admin → Service Accounts → Keys → Add Key → JSON)
# 3. Share your Google Sheet with the client_email address above (Editor access)
# 4. Make sure the Sheet has tabs named opex_ITEMS and opex_LOG (the app will
#    auto-create them with the correct headers on first run if they don't exist)
